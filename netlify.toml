[build]
  publish = "."
  command = "echo 'Static site'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/payment"
  to = "/pages/payment.html"
  status = 200

[[redirects]]
  from = "/scan"
  to = "/pages/scan.html"
  status = 200

[[redirects]]
  from = "/checkout"
  to = "/pages/payment.html"
  status = 200

[[redirects]]
  from = "/sdk"
  to = "https://github.com/ghostpay/sdk"
  status = 302

[[redirects]]
  from = "/docs"
  to = "/#features"
  status = 302
