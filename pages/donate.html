<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ghost Pay - Donate with Crypto">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https://cdn.jsdelivr.net https://s2.coinmarketcap.com data: blob:; connect-src 'self' https://cdn.jsdelivr.net;">
    <title>Ghost Pay - Donate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0A;
            --surface: #111111;
            --surface-2: #1A1A1A;
            --surface-3: #222222;
            --border: #2A2A2A;
            --border-hover: #3A3A3A;
            --text: #FFFFFF;
            --text-secondary: #B0B0B0;
            --text-muted: #666666;
            --accent: #FFFFFF;
            --accent-hover: #E0E0E0;
            --accent-glow: rgba(255, 255, 255, 0.08);
            --success: #00FF88;
            --error: #FF4444;
            --warning: #FFAA00;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        *::-webkit-scrollbar { width: 0; height: 0; }
        * { scrollbar-width: none; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .donate-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }

        @media (max-width: 900px) {
            .donate-layout { grid-template-columns: 1fr; }
        }

        /* LEFT PANEL */
        .info-panel {
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @media (max-width: 900px) {
            .info-panel { padding: 32px 24px; }
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 100;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            border-radius: var(--radius-sm);
            color: #000;
        }

        .brand-name {
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .donate-title {
            font-family: 'Space Mono', monospace;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .donate-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .preset-amounts {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        @media (max-width: 500px) {
            .preset-amounts { grid-template-columns: repeat(2, 1fr); }
        }

        .preset-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .preset-btn:hover {
            border-color: var(--border-hover);
            background: var(--surface-3);
        }

        .preset-btn.active {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .preset-btn.more-btn {
            background: transparent;
            border-style: dashed;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .preset-btn.more-btn:hover {
            color: var(--text);
            border-color: var(--text-secondary);
        }

        .custom-amount-wrapper {
            position: relative;
            margin-bottom: 32px;
        }

        .custom-amount-wrapper .currency-symbol {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .custom-amount-input {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px 16px 16px 36px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            outline: none;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
        }

        .custom-amount-input::-webkit-outer-spin-button,
        .custom-amount-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .custom-amount-input:focus {
            border-color: var(--border);
        }

        .custom-amount-input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        .receiver-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 32px;
        }

        .receiver-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .receiver-name {
            font-size: 18px;
            font-weight: 600;
        }

        .receiver-description {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* RIGHT PANEL */
        .payment-panel {
            background: var(--bg);
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @media (max-width: 900px) {
            .payment-panel {
                padding: 32px 24px;
            }
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .crypto-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .crypto-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px 12px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .crypto-btn:hover {
            border-color: var(--border-hover);
            background: var(--surface-3);
        }

        .crypto-btn.active {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .crypto-icon {
            font-size: 24px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .crypto-icon img {
            border-radius: 50%;
        }

        .crypto-name {
            font-size: 12px;
            font-weight: 600;
        }

        .total-section {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 24px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .total-row:last-child {
            margin-bottom: 0;
        }

        .total-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .total-value {
            font-family: 'Space Mono', monospace;
            font-size: 24px;
            font-weight: 700;
        }

        .donate-btn {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: var(--radius-md);
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
        }

        .donate-btn:hover {
            background: var(--accent-hover);
        }

        .donate-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .qr-section {
            text-align: center;
            padding: 24px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
        }

        .qr-container {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }

        .qr-hint {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .modal-title {
            font-family: 'Space Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .modal-text {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .modal-btn {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: var(--radius-md);
            padding: 12px 32px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .copy-link {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            margin-top: 16px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .copy-link:hover {
            border-color: var(--border-hover);
        }

        .copy-link span {
            flex: 1;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .copy-link .copy-icon {
            color: var(--text-muted);
        }

        .features-list {
            list-style: none;
            margin-top: 32px;
        }

        .features-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            color: var(--text-secondary);
        }

        .features-list li:last-child {
            border-bottom: none;
        }

        .features-list .check {
            color: var(--success);
        }

        /* Coin Modal */
        .coin-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .coin-modal-overlay.active { display: flex; }

        .coin-modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            width: 90%;
            max-width: 420px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .coin-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px 12px;
        }

        .coin-modal-title {
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
        }

        .coin-modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .coin-modal-close:hover { color: var(--text); }

        .coin-search {
            padding: 0 24px 12px;
        }

        .coin-search input {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .coin-search input:focus {
            border-color: var(--border);
        }

        .coin-search input::placeholder {
            color: var(--text-muted);
        }

        .coin-list {
            overflow-y: auto;
            padding: 0 12px 12px;
        }

        .coin-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background 0.15s;
        }

        .coin-list-item:hover {
            background: var(--surface-2);
        }

        .coin-list-item.selected {
            background: var(--accent-glow);
        }

        .coin-list-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .coin-list-info {
            flex: 1;
        }

        .coin-list-name {
            font-size: 14px;
            font-weight: 600;
        }

        .coin-list-symbol {
            font-size: 12px;
            color: var(--text-muted);
        }

        .coin-list-check {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--border);
        }

        .coin-list-item.selected .coin-list-check {
            background: var(--accent);
            border-color: var(--accent);
        }

        .crypto-more {
            background: transparent;
            border: 1px dashed var(--border);
        }

        .crypto-more:hover {
            border-color: var(--border-hover);
        }
    </style>
</head>
<body>
    <div class="brand">
        <div class="brand-icon">GP</div>
        <div class="brand-name">GHOST PAY</div>
    </div>

    <div class="donate-layout">
        <!-- LEFT PANEL -->
        <div class="info-panel">
            <h1 class="donate-title">Donate</h1>
            <p class="donate-subtitle">Choose an amount and support with crypto</p>

            <div class="receiver-card" id="receiverCard" style="display: none;">
                <div class="receiver-label">Receiver</div>
                <div class="receiver-name" id="receiverName"></div>
                <div class="receiver-description" id="receiverDesc"></div>
            </div>

            <div class="preset-amounts" id="presetAmounts"></div>


        </div>

        <!-- RIGHT PANEL -->
        <div class="payment-panel">
            <div class="section-title">Select Cryptocurrency</div>
            <div class="crypto-grid" id="cryptoGrid">
                <button class="crypto-btn active" data-chain="bitcoin">
                    <div class="crypto-icon"><img src="https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/btc.svg" width="32" height="32" alt="BTC"></div>
                    <div class="crypto-name">Bitcoin</div>
                </button>
                <button class="crypto-btn" data-chain="ethereum">
                    <div class="crypto-icon"><img src="https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/eth.svg" width="32" height="32" alt="ETH"></div>
                    <div class="crypto-name">Ethereum</div>
                </button>
                <button class="crypto-btn" data-chain="solana">
                    <div class="crypto-icon"><img src="https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/sol.svg" width="32" height="32" alt="SOL"></div>
                    <div class="crypto-name">Solana</div>
                </button>
                <button class="crypto-btn" data-chain="polygon">
                    <div class="crypto-icon"><img src="https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/matic.svg" width="32" height="32" alt="MATIC"></div>
                    <div class="crypto-name">Polygon</div>
                </button>
                <button class="crypto-btn" data-chain="bsc">
                    <div class="crypto-icon"><img src="https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/bnb.svg" width="32" height="32" alt="BNB"></div>
                    <div class="crypto-name">BSC</div>
                </button>
                <button class="crypto-btn crypto-more" id="moreCryptoBtn">
                    <div class="crypto-icon">+</div>
                    <div class="crypto-name">More</div>
                </button>
            </div>

            <div class="total-section">
                <div class="total-row">
                    <span class="total-label">Amount</span>
                    <span class="total-value" id="totalAmount">$0.00</span>
                </div>
                <div class="total-row">
                    <span class="total-label">Network</span>
                    <span id="selectedChainName" style="font-weight: 600;">Bitcoin</span>
                </div>
            </div>

            <button class="donate-btn" id="donateBtn" disabled>Donate Now</button>

            <div id="donateError" style="display:none; background:rgba(255,68,68,0.1); border:1px solid rgba(255,68,68,0.3); border-radius:var(--radius-md); padding:12px 16px; margin-top:12px; font-size:13px; color:#FF4444;"></div>

            <div class="qr-section" id="qrSection" style="display: none;">
                <div class="qr-container" id="qrContainer"></div>
                <div class="qr-hint">Scan with Ghost Wallet</div>
                <div class="copy-link" id="copyLink" style="display: none;">
                    <span id="donateLink"></span>
                    <span class="copy-icon">Copy</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Coin Modal -->
    <div class="coin-modal-overlay" id="coin-modal" onclick="if(event.target===this)closeCoinModal()">
        <div class="coin-modal">
            <div class="coin-modal-header">
                <div class="coin-modal-title">Select Coin</div>
                <button class="coin-modal-close" onclick="closeCoinModal()">&times;</button>
            </div>
            <div class="coin-search">
                <input type="text" id="coin-search-input" placeholder="Search coin..." oninput="filterCoins()">
            </div>
            <div class="coin-list" id="coin-list"></div>
        </div>
    </div>

    <!-- Custom Amount Modal -->
    <div class="modal-overlay" id="moreModal">
        <div class="modal">
            <div class="modal-title">Custom Amount</div>
            <div class="modal-text">Enter the amount you want to donate</div>
            <div class="custom-amount-wrapper" style="margin-bottom: 20px;">
                <span class="currency-symbol">$</span>
                <input
                    type="number"
                    class="custom-amount-input"
                    id="modalAmount"
                    placeholder="0.00"
                    min="0.01"
                    step="0.01"
                    autofocus
                >
            </div>
            <div style="display: flex; gap: 12px;">
                <button class="modal-btn" style="flex: 1; background: var(--surface-3); color: var(--text);" onclick="closeMoreModal()">Cancel</button>
                <button class="modal-btn" style="flex: 1;" onclick="confirmCustomAmount()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal-overlay" id="successModal">
        <div class="modal">
            <div class="modal-icon">&#10003;</div>
            <div class="modal-title">Donation Created</div>
            <div class="modal-text" id="modalText">Donation link generated successfully.</div>
            <button class="modal-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="/components/ghost-qrcode.js?v=3"></script>
    <script src="/sdk/ghostpay-sdk.js?v=3"></script>
    <script>
        const SDK = window.GhostPaySDK;

        // State
        let selectedChain = 'bitcoin';
        let selectedAmount = 0;
        let receiverName = '';
        let receiverDesc = '';
        let presetAmounts = [5, 10, 25, 50, 100];

        // More coins list
        const MORE_COINS = [
            { chain: 'avalanche-2', name: 'Avalanche', symbol: 'AVAX', icon: 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/avax.svg', color: '#E84142' },
            { chain: 'cardano', name: 'Cardano', symbol: 'ADA', icon: 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/ada.svg', color: '#0033AD' },
            { chain: 'polkadot', name: 'Polkadot', symbol: 'DOT', icon: 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/dot.svg', color: '#E6007A' },
            { chain: 'dogecoin', name: 'Dogecoin', symbol: 'DOGE', icon: 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/doge.svg', color: '#C2A633' },
            { chain: 'tron', name: 'Tron', symbol: 'TRX', icon: 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/trx.svg', color: '#FF0013' },
            { chain: 'cosmos', name: 'Cosmos', symbol: 'ATOM', icon: 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/atom.svg', color: '#2E3148' },
            { chain: 'litecoin', name: 'Litecoin', symbol: 'LTC', icon: 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/ltc.svg', color: '#BFBBBB' },
            { chain: 'fantom', name: 'Fantom', symbol: 'FTM', icon: 'https://s2.coinmarketcap.com/static/img/coins/64x64/3513.png', color: '#1969FF' },
            { chain: 'algorand', name: 'Algorand', symbol: 'ALGO', icon: 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/algo.svg', color: '#000000' },
            { chain: 'stellar', name: 'Stellar', symbol: 'XLM', icon: 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/xlm.svg', color: '#14B6E7' },
            { chain: 'monero', name: 'Monero', symbol: 'XMR', icon: 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/xmr.svg', color: '#FF6600' },
            { chain: 'dash', name: 'Dash', symbol: 'DASH', icon: 'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/dash.svg', color: '#008DE4' },
        ];

        function openCoinModal() {
            document.getElementById('coin-modal').classList.add('active');
            renderCoinList('');
            document.getElementById('coin-search-input').value = '';
            document.getElementById('coin-search-input').focus();
        }

        function closeCoinModal() {
            document.getElementById('coin-modal').classList.remove('active');
        }

        function filterCoins() {
            const query = document.getElementById('coin-search-input').value.toLowerCase();
            renderCoinList(query);
        }

        function renderCoinList(query) {
            const list = document.getElementById('coin-list');
            const allCoins = [...MORE_COINS];
            const filtered = query
                ? allCoins.filter(c => c.name.toLowerCase().includes(query) || c.symbol.toLowerCase().includes(query))
                : allCoins;

            list.innerHTML = filtered.map(coin => `
                <div class="coin-list-item ${selectedChain === coin.chain ? 'selected' : ''}" onclick="selectMoreCoin('${coin.chain}')">
                    <div class="coin-list-icon">
                        <img src="${coin.icon}" width="32" height="32" alt="${coin.symbol}">
                    </div>
                    <div class="coin-list-info">
                        <div class="coin-list-name">${coin.name}</div>
                        <div class="coin-list-symbol">${coin.symbol}</div>
                    </div>
                    <div class="coin-list-check"></div>
                </div>
            `).join('');
        }

        function selectMoreCoin(chain) {
            const coin = MORE_COINS.find(c => c.chain === chain);
            if (!coin) return;
            selectedChain = chain;

            const grid = document.getElementById('cryptoGrid');
            grid.querySelectorAll('.crypto-btn').forEach(b => b.classList.remove('active'));

            const existingBtn = grid.querySelector(`[data-chain="${chain}"]`);
            if (existingBtn) {
                existingBtn.classList.add('active');
            } else {
                const moreBtn = grid.querySelector('.crypto-more');
                if (moreBtn) {
                    const newBtn = document.createElement('button');
                    newBtn.className = 'crypto-btn active';
                    newBtn.setAttribute('data-chain', chain);
                    const iconHtml = `<img src="${coin.icon}" width="28" height="28" alt="${coin.symbol}" style="border-radius: 50%;">`;
                    newBtn.innerHTML = `
                        <div class="crypto-icon">${iconHtml}</div>
                        <div class="crypto-name">${coin.symbol}</div>
                    `;
                    newBtn.onclick = () => {
                        grid.querySelectorAll('.crypto-btn').forEach(b => b.classList.remove('active'));
                        newBtn.classList.add('active');
                        selectedChain = chain;
                        document.getElementById('selectedChainName').textContent = coin.name;
                        updateTotal();
                    };
                    grid.insertBefore(newBtn, moreBtn);
                }
            }

            document.getElementById('selectedChainName').textContent = coin.name;
            updateTotal();
            closeCoinModal();
        }

        // URL params
        const params = new URLSearchParams(window.location.search);
        receiverName = params.get('receiver') || 'Ghost Pay';
        receiverDesc = params.get('description') || '';
        const urlChain = params.get('chain');
        const urlAmount = params.get('amount');
        const customPresets = params.get('presets');

        if (urlChain) selectedChain = urlChain;
        if (customPresets) {
            try { presetAmounts = JSON.parse(customPresets); } catch {}
        }

        // Init receiver
        if (receiverName) {
            document.getElementById('receiverCard').style.display = 'block';
            document.getElementById('receiverName').textContent = receiverName;
            document.getElementById('receiverDesc').textContent = receiverDesc;
        }

        // Render preset amounts
        const presetContainer = document.getElementById('presetAmounts');
        presetAmounts.forEach(amount => {
            const btn = document.createElement('button');
            btn.className = 'preset-btn';
            btn.textContent = `$${amount}`;
            btn.onclick = () => selectPreset(amount, btn);
            presetContainer.appendChild(btn);
        });

        // Add "More" button
        const moreBtn = document.createElement('button');
        moreBtn.className = 'preset-btn more-btn';
        moreBtn.textContent = 'More';
        moreBtn.onclick = () => openMoreModal();
        presetContainer.appendChild(moreBtn);

        // Pre-fill from URL
        if (urlAmount) {
            const amt = parseFloat(urlAmount);
            if (presetAmounts.includes(amt)) {
                const btns = document.querySelectorAll('.preset-btn');
                btns.forEach(b => { if (b.textContent === `$${amt}`) selectPreset(amt, b); });
            }
        }

        function selectPreset(amount, btn) {
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedAmount = amount;
            updateTotal();
        }

        // Crypto selection
        const chainNames = { bitcoin: 'Bitcoin', ethereum: 'Ethereum', solana: 'Solana', polygon: 'Polygon', bsc: 'BSC' };

        const donateAddress = params.get('address') || '';

        function showError(msg) {
            const el = document.getElementById('donateError');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError() {
            document.getElementById('donateError').style.display = 'none';
        }

        function updateBtnState() {
            const btn = document.getElementById('donateBtn');
            if (!donateAddress) {
                btn.disabled = true;
                btn.title = 'No wallet address configured';
            } else {
                btn.disabled = selectedAmount <= 0;
                btn.title = '';
            }
        }

        document.querySelectorAll('.crypto-btn:not(.crypto-more)').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.crypto-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedChain = btn.dataset.chain;
                document.getElementById('selectedChainName').textContent = chainNames[selectedChain];
                updateTotal();
            };
        });

        // Set initial chain from URL
        if (urlChain && chainNames[urlChain]) {
            document.querySelectorAll('.crypto-btn').forEach(b => {
                b.classList.remove('active');
                if (b.dataset.chain === urlChain) b.classList.add('active');
            });
            document.getElementById('selectedChainName').textContent = chainNames[selectedChain];
        }

        if (!donateAddress) {
            showError('No wallet address configured. Add &address=YOUR_WALLET to the URL.');
        }

        function updateTotal() {
            document.getElementById('totalAmount').textContent = `$${selectedAmount.toFixed(2)}`;
            updateBtnState();
        }

        // Donate button
        document.getElementById('donateBtn').onclick = () => {
            if (selectedAmount <= 0) return;
            hideError();

            if (!donateAddress) {
                showError('No wallet address configured. Add &address=YOUR_WALLET to the URL.');
                return;
            }

            const btn = document.getElementById('donateBtn');
            btn.disabled = true;
            btn.textContent = 'Generating...';

            try {
                const donate = new SDK.Donate({
                    receiver: { name: receiverName },
                    presetAmounts,
                    currency: 'USD',
                    defaultChain: selectedChain,
                    description: receiverDesc,
                });

                donate.selectChain(selectedChain);
                donate.setCustomAmount(selectedAmount);

                const signingKey = params.get('signingKey') || undefined;
                const link = donate.generateDonateLink(donateAddress, signingKey);

                const qrSection = document.getElementById('qrSection');
                qrSection.style.display = 'block';

                const qrContainer = document.getElementById('qrContainer');
                qrContainer.innerHTML = '';

                if (typeof QRCode !== 'undefined') {
                    QRCode.toCanvas(link, {
                        width: 200,
                        margin: 2,
                        color: { dark: '#000000', light: '#FFFFFF' }
                    }, (err, canvas) => {
                        if (!err && canvas) {
                            canvas.style.borderRadius = '12px';
                            qrContainer.appendChild(canvas);
                        }
                    });
                } else {
                    const ghostQR = document.createElement('ghost-qrcode');
                    ghostQR.setAttribute('data', link);
                    ghostQR.setAttribute('size', '200');
                    qrContainer.appendChild(ghostQR);
                }

                const copyLink = document.getElementById('copyLink');
                copyLink.style.display = 'flex';
                document.getElementById('donateLink').textContent = link;

                copyLink.onclick = () => {
                    navigator.clipboard.writeText(link).then(() => {
                        document.getElementById('modalText').textContent = 'Link copied to clipboard.';
                        document.getElementById('successModal').classList.add('active');
                    });
                };

                document.getElementById('modalText').textContent = `Donation of $${selectedAmount.toFixed(2)} on ${chainNames[selectedChain]} created.`;
                document.getElementById('successModal').classList.add('active');

            } catch (err) {
                console.error('Donate error:', err);
                showError('Failed to generate donation link. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Donate Now';
                updateBtnState();
            }
        };

        function closeModal() {
            document.getElementById('successModal').classList.remove('active');
        }

        function openMoreModal() {
            document.getElementById('moreModal').classList.add('active');
            document.getElementById('modalAmount').value = '';
            setTimeout(() => document.getElementById('modalAmount').focus(), 100);
        }

        function closeMoreModal() {
            document.getElementById('moreModal').classList.remove('active');
        }

        function confirmCustomAmount() {
            const val = parseFloat(document.getElementById('modalAmount').value);
            if (isNaN(val) || val < 0.01) {
                document.getElementById('modalAmount').style.borderColor = '#FF4444';
                return;
            }
            document.getElementById('modalAmount').style.borderColor = '';
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            selectedAmount = val;
            updateTotal();
            closeMoreModal();
        }

        // Init
        updateTotal();

        // Bind More crypto button
        document.getElementById('moreCryptoBtn').addEventListener('click', function() {
            openCoinModal();
        });
    </script>
</body>
</html>
